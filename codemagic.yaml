workflows:
  ios_capacitor_testflight:
    name: iOS Capacitor TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    integrations:
      app_store_connect: Deison Braga

    environment:
      node: 22
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - cm_profile_appicamedtec_appstore
        certificates:
          - cm_certificate_apple_distribution_v2
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Sync web assets to iOS
        script: npm run cap:sync:ios

      - name: Set unique iOS build number
        script: |
          IOS_BUILD_NUMBER="$(date +%s)"
          echo "Using iOS build number: ${IOS_BUILD_NUMBER}"
          cd ios/App
          agvtool new-version -all "${IOS_BUILD_NUMBER}"
          cd ../..

      - name: Fetch signing files from App Store Connect
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
